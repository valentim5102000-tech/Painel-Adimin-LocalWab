<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalWab Admin Login</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:#1e293b; padding:30px; border-radius:15px; width:300px; text-align:center; }
input { display:block; width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none; }
button { padding:10px 15px; border:none; border-radius:5px; background:#22c55e; color:white; cursor:pointer; width:100%; }
.error { color:#ef4444; margin-top:10px; }
h2 { margin-bottom:20px; }
</style>
</head>
<body>

<div class="container">
<h2>Login Admin</h2>
<input type="text" id="username" placeholder="Usuário">
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div class="error" id="errorMsg"></div>
</div>

<script>
// Usuário e senha padrão
let adminUser = "valentim24";
let adminPass = "Valentim24@";

function login() {
    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value.trim();
    if(u === adminUser && p === adminPass){
        window.location.href = "dashboard.html"; // Redireciona para o dashboard atualizado
    } else {
        document.getElementById("errorMsg").innerText = "Usuário ou senha inválido!";
    }
}
</script>

</body>
</html>
