<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalWab Admin Login</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white;}
.login { display:flex; justify-content:center; align-items:center; height:100vh; }
.box { background:#1e293b; padding:30px; border-radius:10px; text-align:center; }
input { display:block; margin:10px auto; padding:10px; width:200px; border-radius:5px; border:none; }
button { padding:10px; background:#22c55e; border:none; color:white; cursor:pointer; border-radius:5px; }
</style>
</head>
<body>

<div id="loginScreen" class="login">
    <div class="box">
        <h2>🔐 LocalWab Admin</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<script>
const accounts = [
    {usuario:"admin", senha:"1234"},
    {usuario:"valentim24", senha:"Valentim24@"}
];

function login(){
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();
    const valid = accounts.find(acc => acc.usuario === u && acc.senha === p);

    if(valid){
        // Abre dashboard em nova janela
        window.open("dashboard.html", "_blank");
    } else {
        alert("Usuário ou senha inválidos!");
    }
}
</script>

</body>
</html>
